project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - courses/*.qmd
    - designations/*.qmd
    - outcomes/*.qmd
    - skills/*.qmd
    - planner/*.qmd
    - review/*.qmd
    - docs/methodology.qmd

website:
  title: "UBCO Freshwater Science"
  description: "Course pathways, professional designations, and learning outcomes for the UBC Okanagan Bachelor of Science - Freshwater Science major."
  site-url: "https://drnelsonjatel.github.io/UBCO_Freshwater_Science_Program/"
  favicon: assets/favicon.png
  page-footer:
    left: |
      Maintained by Dr. Nelson Jatel, PAg, Lecturer and Freshwater
      Science Program Advisor, Department of Earth, Environmental and
      Geographic Sciences, UBC Okanagan.
      [nelson.jatel@ubc.ca](mailto:nelson.jatel@ubc.ca)
    center: |
      This is a curated advising resource. **The
      [UBC Okanagan Academic Calendar](https://okanagan.calendar.ubc.ca/)
      is the authoritative source for all degree requirements.**
    right: |
      [Source code](https://github.com/DrNelsonJatel/UBCO_Freshwater_Science_Program)
      · Last updated `{{< meta date >}}`
  navbar:
    background: "#1f3a5f"
    foreground: "#ffffff"
    title: "UBCO Freshwater Science"
    left:
      - href: index.qmd
        text: Home
      - text: Courses
        href: courses/index.qmd
      - text: Designations
        menu:
          - href: designations/pag.qmd
            text: PAg (BC Institute of Agrologists)
          - href: designations/rpbio.qmd
            text: RPBio (College of Applied Biology)
          - href: designations/complementary.qmd
            text: Complementary pathways
      - text: Outcomes
        href: outcomes/index.qmd
      - text: Skills
        href: skills/index.qmd
      - text: Planner
        href: https://obwb.shinyapps.io/ubco-freshwater-planner/
        target: _blank
    right:
      - href: docs/methodology.qmd
        text: Methodology
      - text: "📧 Contact advisor"
        href: "mailto:nelson.jatel@ubc.ca?subject=UBCO%20Freshwater%20Science%20-%20Student%20enquiry"
        aria-label: "Email Dr. Nelson Jatel, Freshwater Science Program Advisor"
      - icon: github
        href: https://github.com/DrNelsonJatel/UBCO_Freshwater_Science_Program
        aria-label: GitHub

format:
  html:
    theme:
      light: cosmo
    css: assets/styles.css
    toc: true
    toc-depth: 3
    code-tools: false
    smooth-scroll: true
    # All links to off-site URLs open in a new tab so a click never
    # navigates the student away from the planning resource. Internal
    # links inside this site keep their normal same-tab behaviour.
    link-external-newwindow: true
    link-external-icon: true

execute:
  freeze: auto
