# Curated 4-year sample plan from the advising pack (Track 1 - RPBio).
# Each term lists the courses that satisfy the requirements in that
# slot. "ex." marks examples (substitutable with comparable content).
sample_plan:
  year_1_t1:
    - BIOL 116
    - 'CHEM 121 or CHEM 123 (one of)'
    - MATH 100
    - 'WRDS 150 / ENGL / Comm'
    - 'elective'
  year_1_t2:
    - BIOL 125
    - 'CHEM 121/123 (the other)'
    - 'PHYS 111 or PHYS 112'
    - 'elective'
  year_2_t1:
    - BIOL 201
    - 'STAT 230 / GEOG 271 / BIOL 202 (>=2nd-year stats)'
    - EESC 205
    - 'elective'
  year_2_t2:
    - EESC 222
    - CHEM 211
    - BIOL 200
    - 'elective'
  year_3_t1:
    - 'EESC 301 (Limnology)'
    - 'FWSC 375 / BIOL 375'
    - CHEM 301
    - 'elective'
  year_3_t2:
    - BIOL 265
    - 'BIOL 356 (animal) or BIOL 358 (plant ecophysiology)'
    - 'BIO upper-level (reach 13 BIO courses)'
    - 'Systematics: confirm transfer-credit plan with advisor (no UBCO equivalent currently offered)'
  year_4_t1:
    - EESC 402
    - 'EESC 309 / 323 / 423 (choose 1-2)'
    - 'BIO upper-level'
  year_4_t2:
    - 'EESC 342 or EESC 413'
    - 'BIO upper-level'
    - 'Directed Studies / Field / Special Topics'
