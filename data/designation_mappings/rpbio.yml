designation: RPBio
designation_body: College of Applied Biologists (CAB)
source_documents:
  - path: docs/reference/CAB_RPBio_Standard_2025-06.txt
    url: https://cab-bc.org/wp-content/uploads/Credentialing_Standard_June-2025.pdf
    dated: '2025-06-01'
    notes: 'CAB Credentialing Standard, June 2025. Authority on the 25-science / 13-biology / 3-of-5 requirements.'
  - path: docs/reference/advising/UBCO_Freshwater_Professional_Paths_Advising_Pack.pdf
    url: ''
    dated: '2025-09-04'
    notes: 'Internal UBCO advising pack curated by the program lead (Dr. Nelson Jatel, PAg). Source of the UBCO-specific gap-filler list - CAB does NOT publish a UBCO-specific approved-course PDF.'

# CAB requirements as a structured object the planner reads.
requirements:
  science_courses_total: 25
  biology_courses_total: 13
  three_of_five_required:
    - genetics
    - cell_biology
    - physiology
    - systematics_taxonomy
    - evolution
  required_core_areas:
    - communications
    - chemistry
    - numeracy
    - statistics_second_year_or_higher
    - applied_biology_management
    - ecology

# Each core requirement mapped to the UBCO courses that satisfy it,
# curated from the September-2025 advising pack. These are the
# program lead's authoritative picks for what a Freshwater Science
# transcript should look like to clear CAB review without a deficiency
# letter.
categories:

  communications:
    name: Communications
    description: Communications / writing requirement (typically first-year writing).
    requires: ['1 course']
    courses_eligible:
      - { code: ENGL 104, title: 'University Writing: Indigenous Perspectives' }
      - { code: ENGL 109, title: 'Studies in Composition (Enhanced)' }
      - { code: ENGL 112, title: 'Studies in Composition' }
      - { code: ENGL 114, title: 'Studies in Composition: Indigenous Perspectives' }
      - { code: ENGL 150, title: 'Introduction to Literary Genre' }
      - { code: ENGL 151, title: 'Critical Studies in Literature' }
      - { code: ENGL 153, title: 'Readings in Narrative' }
      - { code: BIOL 313, title: 'Science Writing' }
      - { code: EESC 398, title: 'Technical Communication' }

  chemistry:
    name: Chemistry
    description: General chemistry sequence; analytical and aqueous environmental chemistry.
    requires: ['CHEM 121 + CHEM 123 (Year-1 sequence)', 'CHEM 211 (analytical)']
    courses_eligible:
      - { code: CHEM 121, title: 'Atomic and Molecular Chemistry' }
      - { code: CHEM 123, title: 'Physical and Organic Chemistry' }
      - { code: CHEM 201, title: 'Introduction to Physical Chemistry' }
      - { code: CHEM 210, title: 'Organic Chemistry I' }
      - { code: CHEM 211, title: 'Analytical Chemistry' }
      - { code: CHEM 301, title: 'Aqueous Environmental Chemistry' }

  numeracy:
    name: Numeracy
    description: First-year calculus.
    requires: ['MATH 100 (and 101 strongly recommended)']
    courses_eligible:
      - { code: MATH 100, title: 'Differential Calculus' }
      - { code: MATH 101, title: 'Integral Calculus' }
      - { code: MATH 103, title: 'Integral Calculus with Applications' }

  statistics_second_year_or_higher:
    name: Statistics (2nd-year or higher)
    description: Statistics course at the second-year level or higher.
    requires: ['1 course']
    courses_eligible:
      - { code: STAT 230, title: 'Introductory Statistics' }
      - { code: BIOL 202, title: 'Introduction to Biostatistics' }
      - { code: GEOG 271, title: 'Statistics in Geography' }

  applied_biology_management:
    name: Applied biology / management
    description: Applied biology, freshwater resource management, conservation planning.
    requires: ['1+ course']
    courses_eligible:
      - { code: EESC 402, title: 'Freshwater Resources' }
      - { code: BIOL 308, title: 'Population Biology' }
      - { code: EESC 314, title: 'Environmental Impact Assessment: Process, Regulation and Administration' }
      - { code: EESC 315, title: 'Environmental Impact Assessment: Techniques and Practice' }

  ecology:
    name: Ecology
    description: Ecology and ecological thinking across populations, communities, and ecosystems.
    requires: ['1+ course']
    courses_eligible:
      - { code: BIOL 117, title: 'Evolution and Ecology' }
      - { code: BIOL 201, title: 'Introduction to Evolution and Ecology' }
      - { code: BIOL 306, title: 'Ecology of Animals' }
      - { code: BIOL 308, title: 'Population Biology' }
      - { code: BIOL 401, title: 'Spatial Ecology' }
      - { code: BIOL 414, title: 'Advanced Field Ecology' }
      - { code: BIOL 417, title: 'Evolutionary Ecology' }
      - { code: BIOL 459, title: 'Behavioural Ecology' }
      - { code: EESC 301, title: 'Limnology' }
      - { code: FWSC 375, title: 'Flora and Fauna of Inland Waters (cross-listed BIOL 375)' }

  # The three-of-five required subject areas.
  genetics:
    name: Genetics
    description: One of the five required subject areas; need at least 3 of 5.
    requires: ['1 course']
    courses_eligible:
      - { code: BIOL 265, title: 'Principles of Genetics' }
    notes: |
      The advising pack flags BIOL 265 as the canonical gap-filler for
      this area in a Freshwater Science transcript.

  cell_biology:
    name: Cell biology
    description: One of the five required subject areas; need at least 3 of 5.
    requires: ['1 course']
    courses_eligible:
      - { code: BIOL 200, title: 'Cell Biology' }
    notes: |
      The advising pack flags BIOL 200 as the canonical gap-filler for
      this area.

  physiology:
    name: Physiology
    description: One of the five required subject areas; need at least 3 of 5.
    requires: ['1 course']
    courses_eligible:
      - { code: BIOL 356, title: 'Comparative Animal Physiology' }
      - { code: BIOL 358, title: 'Plant Ecophysiology' }
    notes: |
      BIOL 356 (animal) or BIOL 358 (plant ecophysiology) - pick
      whichever aligns with your applied interest. (The September-2025
      advising pack listed these with the plant/animal labels swapped;
      the values above match the current UBCO Academic Calendar.)

  systematics_taxonomy:
    name: Systematics / taxonomy
    description: One of the five required subject areas; need at least 3 of 5.
    requires: ['1 course']
    courses_eligible: []
    notes: |
      ATTENTION - UBCO does not currently offer a dedicated systematics
      or taxonomy undergraduate course. Students targeting RPBio should
      either (a) plan to fulfil this requirement via a course taken at
      another institution and transferred in, or (b) choose two of the
      remaining four three-of-five areas (genetics, cell biology,
      physiology, evolution) instead. Confirm with the program advisor
      and CAB before registering. This gap was identified during the
      May 2026 QAQC pass against the live UBCO Academic Calendar.

  evolution:
    name: Evolution
    description: One of the five required subject areas; need at least 3 of 5.
    requires: ['1 course']
    courses_eligible:
      - { code: BIOL 117, title: 'Evolution and Ecology' }
      - { code: BIOL 201, title: 'Introduction to Evolution and Ecology' }
      - { code: BIOL 301, title: 'Evolutionary Principles and Methods' }
      - { code: BIOL 417, title: 'Evolutionary Ecology' }
      - { code: BIOL 468, title: 'Molecular Approaches in Ecology and Evolution' }
    notes: |
      BIOL 201 is already in the Freshwater Science core, so the
      evolution requirement is satisfied for most students by the
      program; the practical 3-of-5 target therefore becomes "evolution
      (BIOL 201) + 2 more of cell / genetics / physiology" because the
      systematics gap (above) makes that area harder to fill at UBCO.

